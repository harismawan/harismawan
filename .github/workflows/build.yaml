name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 21 * * *"   # 04:00 WIB (UTC+7)
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cache/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Update SVG cards
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit
        run: |-
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "harismawan/GitHub-Actions-Bot"
          git add .
          git diff --staged --quiet || git commit -m "Updated profile card"
          git push
